name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  DATABASE_URL: "sqlite+pysqlite:///:memory:"
  REDIS_URL: "redis://localhost:6379/0"
  PYTHONPYCACHEPREFIX: ${{ github.workspace }}/backend/pytest-cache-files-local/pycache-prefix
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
            backend/requirements-ml.txt

      - name: Install backend dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Guard tracked generated files
        run: python scripts/ci_guard.py

      - name: Compile backend
        run: python -m compileall backend/app

      - name: Collect Phase 8 backend tests
        working-directory: backend
        run: >-
          python -m pytest
          tests/test_interview_realtime.py
          tests/test_interview_realtime_postgres.py
          tests/test_phase8_env_contract.py
          --collect-only
          --basetemp pytest-cache-files-local
          -p no:cacheprovider

      - name: Run backend tests
        id: backend-tests
        continue-on-error: true
        working-directory: backend
        run: >-
          python -m pytest
          --junitxml=pytest-results.xml
          --basetemp pytest-cache-files-local
          -p no:cacheprovider

      - name: Publish backend test result
        if: always()
        working-directory: backend
        run: |
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          report = Path("pytest-results.xml")
          if not report.is_file():
              print("::error file=.github/workflows/ci.yml,title=pytest::pytest did not produce JUnit XML")
              raise SystemExit(1)

          suite = ET.parse(report).getroot().find(".//testsuite")
          if suite is None:
              print("::error file=.github/workflows/ci.yml,title=pytest::JUnit XML has no testsuite")
              raise SystemExit(1)

          tests = int(suite.attrib.get("tests", 0))
          failures = int(suite.attrib.get("failures", 0))
          errors = int(suite.attrib.get("errors", 0))
          skipped = int(suite.attrib.get("skipped", 0))
          passed = tests - failures - errors - skipped
          print(
              "::notice file=.github/workflows/ci.yml,title=pytest::"
              f"collected={tests} passed={passed} failed={failures + errors} skipped={skipped}"
          )

          for case in suite.findall(".//testcase"):
              failure = case.find("failure")
              if failure is None:
                  failure = case.find("error")
              if failure is None:
                  continue
              message = failure.text or failure.attrib.get("message") or "pytest failure"
              message = " | ".join(message.strip().splitlines()[-20:])[-4000:]
              message = message.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
              path = case.attrib.get("file", ".github/workflows/ci.yml")
              if path != ".github/workflows/ci.yml" and not path.startswith("backend/"):
                  path = f"backend/{path}"
              line = case.attrib.get("line", "1")
              name = case.attrib.get("name", "pytest")
              print(f"::error file={path},line={line},title={name}::{message}")

          raise SystemExit(1 if failures or errors else 0)
          PY

      - name: Check Alembic heads
        working-directory: backend
        run: alembic heads

      - name: Check Alembic history
        working-directory: backend
        run: alembic history

      - name: Validate Docker Compose config
        run: docker compose config

  postgres-migrations:
    name: PostgreSQL Migration Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: cvfit
          POSTGRES_PASSWORD: cvfit
          POSTGRES_DB: cvfit_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cvfit -d cvfit_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql+psycopg2://cvfit:cvfit@localhost:5432/cvfit_ci"
      REDIS_URL: "redis://localhost:6379/0"
      PYTHONPYCACHEPREFIX: ${{ github.workspace }}/backend/pytest-cache-files-local/pycache-prefix
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
            backend/requirements-ml.txt

      - name: Install backend dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import time

          import psycopg2

          database_url = "postgresql://cvfit:cvfit@localhost:5432/cvfit_ci"
          deadline = time.monotonic() + 60
          while True:
              try:
                  with psycopg2.connect(database_url):
                      break
              except psycopg2.OperationalError:
                  if time.monotonic() >= deadline:
                      raise
                  time.sleep(2)
          PY

      - name: Exercise Phase 8 migration cycle on disposable PostgreSQL
        working-directory: backend
        run: |
          alembic upgrade head
          alembic downgrade 20260623_0001
          alembic upgrade head

      - name: Validate Phase 8 PostgreSQL contract
        working-directory: backend
        run: >-
          python -m pytest
          tests/test_interview_realtime_postgres.py
          --basetemp pytest-cache-files-local
          -p no:cacheprovider

      - name: Check Alembic current revision
        working-directory: backend
        run: python ../scripts/check_alembic_current.py

      - name: Validate PostgreSQL schema
        run: python scripts/check_db_schema.py
